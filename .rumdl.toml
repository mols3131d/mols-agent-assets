[global]
flavor = "gfm"
disable = ["MD013", "MD025", "MD033", "MD041"]
exclude = [
	"**/.git/",
	"**/.tmp/",
	"**/tmp/",
	"**/archive/",
	"**/*.tmp.md",

	# --- --- --- ---  --- --- --- ---  --- --- --- ---  --- --- --- ---
	".github/",
	"node_modules/",
	"vendor/",
	"dist/",
	"build/",
]

[MD004]
style = "dash"

[MD029]
style = "ordered"

[MD048]
style = "backtick"

[MD057]
compact-paths = true
