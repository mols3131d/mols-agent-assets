glob_matcher: doublestar

pre-commit:
  exclude:
    - "**/archive/**"
    - "**/*cache*/**"
    - "**/*tmp*/**"
    - "**/*.origin*"
    - "**/*.backup*"
    - "**/*.tmp*"
    - "**/.venv/**"
    - "**/node_modules/**"

  commands:
    rumdl-fmt:
      glob: "**/*.md"
      run: uv run rumdl fmt {staged_files}
      stage_fixed: true
    ruff:
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}
      stage_fixed: true
    ty-check:
      glob: "**/*.py"
      run: uv run ty check {staged_files}
